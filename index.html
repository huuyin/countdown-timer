<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .app {
      text-align: center;
      width: 100%;
      max-width: 480px;
      padding: 2rem;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 2.5rem;
    }

    .display {
      font-size: 6rem;
      font-weight: 200;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: #fff;
      margin-bottom: 0.5rem;
      transition: color 0.3s;
    }

    .display.warning {
      color: #f59e0b;
    }

    .display.danger {
      color: #ef4444;
    }

    .display.finished {
      color: #ef4444;
      animation: pulse 0.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: #222;
      border-radius: 2px;
      margin-bottom: 2.5rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #3b82f6;
      border-radius: 2px;
      transition: width 1s linear, background 0.3s;
      width: 100%;
    }

    .progress-fill.warning { background: #f59e0b; }
    .progress-fill.danger  { background: #ef4444; }

    .input-row {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .time-field {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    .time-field label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
    }

    .time-field input {
      width: 72px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #fff;
      font-size: 1.5rem;
      font-weight: 300;
      text-align: center;
      padding: 0.5rem 0;
      outline: none;
      transition: border-color 0.2s;
      -moz-appearance: textfield;
    }

    .time-field input::-webkit-outer-spin-button,
    .time-field input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .time-field input:focus {
      border-color: #3b82f6;
    }

    .colon {
      font-size: 1.5rem;
      color: #444;
      padding-top: 1.4rem;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
    }

    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      padding: 0.65rem 1.6rem;
      transition: background 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    #btn-start {
      background: #3b82f6;
      color: #fff;
    }

    #btn-start:hover { background: #2563eb; }

    #btn-pause {
      background: #27272a;
      color: #a1a1aa;
    }

    #btn-pause:hover { background: #3f3f46; }

    #btn-reset {
      background: #1a1a1a;
      color: #666;
      border: 1px solid #2a2a2a;
    }

    #btn-reset:hover { background: #27272a; }

    button:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .message {
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #ef4444;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Countdown Timer</h1>

    <div class="display" id="display">00:00:00</div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress"></div>
    </div>

    <div class="input-row">
      <div class="time-field">
        <label>Hours</label>
        <input type="number" id="input-h" min="0" max="99" value="0" placeholder="00">
      </div>
      <div class="colon">:</div>
      <div class="time-field">
        <label>Minutes</label>
        <input type="number" id="input-m" min="0" max="59" value="5" placeholder="00">
      </div>
      <div class="colon">:</div>
      <div class="time-field">
        <label>Seconds</label>
        <input type="number" id="input-s" min="0" max="59" value="0" placeholder="00">
      </div>
    </div>

    <div class="buttons">
      <button id="btn-start">Start</button>
      <button id="btn-pause" disabled>Pause</button>
      <button id="btn-reset">Reset</button>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const display   = document.getElementById('display');
    const progress  = document.getElementById('progress');
    const message   = document.getElementById('message');
    const btnStart  = document.getElementById('btn-start');
    const btnPause  = document.getElementById('btn-pause');
    const btnReset  = document.getElementById('btn-reset');
    const inputH    = document.getElementById('input-h');
    const inputM    = document.getElementById('input-m');
    const inputS    = document.getElementById('input-s');

    let totalSeconds  = 0;
    let remaining     = 0;
    let interval      = null;
    let running       = false;

    function pad(n) {
      return String(n).padStart(2, '0');
    }

    function formatTime(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return `${pad(h)}:${pad(m)}:${pad(s)}`;
    }

    function setColorState(secs) {
      const pct = totalSeconds > 0 ? secs / totalSeconds : 1;
      display.className  = 'display';
      progress.className = 'progress-fill';
      if (secs === 0 && running === false && totalSeconds > 0) {
        display.classList.add('finished');
        progress.className = 'progress-fill danger';
      } else if (pct <= 0.1) {
        display.classList.add('danger');
        progress.classList.add('danger');
      } else if (pct <= 0.25) {
        display.classList.add('warning');
        progress.classList.add('warning');
      }
    }

    function updateDisplay() {
      display.textContent = formatTime(remaining);
      const pct = totalSeconds > 0 ? (remaining / totalSeconds) * 100 : 100;
      progress.style.width = pct + '%';
      setColorState(remaining);
    }

    function getInputSeconds() {
      const h = Math.max(0, parseInt(inputH.value) || 0);
      const m = Math.max(0, Math.min(59, parseInt(inputM.value) || 0));
      const s = Math.max(0, Math.min(59, parseInt(inputS.value) || 0));
      return h * 3600 + m * 60 + s;
    }

    function start() {
      if (running) return;

      if (remaining === 0) {
        totalSeconds = getInputSeconds();
        remaining    = totalSeconds;
      }

      if (remaining === 0) {
        message.textContent = 'Set a time first.';
        return;
      }

      message.textContent = '';
      running = true;
      btnStart.disabled = true;
      btnPause.disabled = false;
      setInputsDisabled(true);

      interval = setInterval(() => {
        remaining--;
        updateDisplay();

        if (remaining <= 0) {
          clearInterval(interval);
          running = false;
          btnStart.disabled = false;
          btnPause.disabled = true;
          btnPause.textContent = 'Pause';
          message.textContent = "Time's up!";
          playBeep();
        }
      }, 1000);
    }

    function pause() {
      if (!running) return;
      clearInterval(interval);
      running = false;
      btnStart.disabled = false;
      btnPause.textContent = 'Resume';
    }

    function resume() {
      btnPause.textContent = 'Pause';
      start();
    }

    function reset() {
      clearInterval(interval);
      running = false;
      remaining = 0;
      totalSeconds = 0;
      display.textContent = '00:00:00';
      display.className = 'display';
      progress.style.width = '100%';
      progress.className = 'progress-fill';
      message.textContent = '';
      btnStart.disabled = false;
      btnPause.disabled = true;
      btnPause.textContent = 'Pause';
      setInputsDisabled(false);
    }

    function setInputsDisabled(disabled) {
      inputH.disabled = disabled;
      inputM.disabled = disabled;
      inputS.disabled = disabled;
    }

    function playBeep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [0, 0.3, 0.6].forEach(offset => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.frequency.value = 880;
          osc.type = 'sine';
          gain.gain.setValueAtTime(0.4, ctx.currentTime + offset);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.25);
          osc.start(ctx.currentTime + offset);
          osc.stop(ctx.currentTime + offset + 0.25);
        });
      } catch (_) {}
    }

    btnStart.addEventListener('click', () => {
      if (!running && remaining === 0) start();
      else start();
    });

    btnPause.addEventListener('click', () => {
      if (running) pause();
      else resume();
    });

    btnReset.addEventListener('click', reset);

    // Clamp inputs on blur
    [inputM, inputS].forEach(input => {
      input.addEventListener('blur', () => {
        const val = parseInt(input.value) || 0;
        input.value = Math.min(59, Math.max(0, val));
      });
    });

    // Initialize display
    updateDisplay();
  </script>
</body>
</html>
